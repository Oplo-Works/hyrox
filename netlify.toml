# Netlify Configuration — NY/NJ Hybrid Race Club
# Next.js 14 App Router 배포 설정

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Next.js 14 requires Node 18.17+ ; use LTS 20
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Next.js plugin is auto-detected by Netlify for Next.js projects.
# The @netlify/plugin-nextjs handles SSR/SSG/static rendering automatically.
# Our app is fully static (all pages ○ Static), so it deploys as static content.

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"